name: 🚀 Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [staging, production]
      dry_run:
        description: "Dry run (no actual deploy)"
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel an in-progress deploy

jobs:
  # ────────────────────────────────────────────────────────────
  pre-deploy:
    name: 🔐 Pre-Deploy Checks
    runs-on: ubuntu-latest
    environment: production
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" == refs/* ]]; then
            TAG="dev-$(echo $GITHUB_SHA | cut -c1-7)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "🏷 Deploying version: $TAG"

      - name: Ensure main branch passed CI
        run: echo "✅ All CI gates passed (enforced by branch protection)"

  # ────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🌍 Deploy → Staging
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: ${{ secrets.STAGING_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging (rsync/SSH)
        run: |
          echo "🚀 Deploying to staging..."
          # In production, uncomment and configure:
          # echo "${{ secrets.STAGING_SSH_KEY }}" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          # rsync -avz --delete \
          #   --exclude '.git' \
          #   --exclude '.env' \
          #   --exclude 'uploads/' \
          #   --exclude 'node_modules/' \
          #   -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
          #   ./ ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }}:${{ secrets.STAGING_PATH }}
          echo "✅ Staging deploy complete — ${{ needs.pre-deploy.outputs.version }}"

  # ────────────────────────────────────────────────────────────
  deploy-production:
    name: 🌐 Deploy → Production
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "🚀 Deploying to production..."
          # Configure SSH + rsync for your hosting provider
          echo "✅ Production deploy complete — ${{ needs.pre-deploy.outputs.version }}"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "PropertyRubix ${{ needs.pre-deploy.outputs.version }}"
          body: |
            ## 🏠 PropertyRubix ${{ needs.pre-deploy.outputs.version }}

            **Deployed:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}

            ### Changes
            <!-- Auto-populated from conventional commits -->
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────
  notify:
    name: 📣 Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()

    steps:
      - name: Deployment Notification
        run: |
          STATUS="${{ needs.deploy-production.result }}"
          if [ "$STATUS" = "success" ]; then
            echo "✅ DEPLOY SUCCESS — ${{ github.ref_name }}"
          else
            echo "❌ DEPLOY FAILED — Check logs"
          fi
          # Add Slack/Teams/email notification here using secrets
