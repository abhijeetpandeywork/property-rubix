name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH Deploy and Setup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '147.93.23.184'
          port: 65002
          username: 'u406313474'
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd domains/property.digitalrubix.site/public_html
            
            # Setup safe directory to avoid git issues
            git config --global --add safe.directory /home/u406313474/domains/property.digitalrubix.site/public_html
            
            # Setup Git repo
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/abhijeetpandeywork/property-rubix.git
              git fetch
              git checkout -f main
            else
              git fetch --all
              git reset --hard origin/main
            fi
            
            # Remove default landing page
            rm -f default.php
            
            # Generate environment variables config
            cat <<EOF > .env
            DB_HOST=127.0.0.1
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            BASE_URL=http://property.digitalrubix.site/
            APP_ENV=production
            EOF
            
            echo "✓ Environment variables configured"
            
            # Run database migrations
            php database/migrate.php
            
            # Run data seeders
            php seed_global_data.php
            
            echo "✓ Deployment complete and database migrations/seeds applied successfully."
